<html><body>

    <head>

        <link rel="stylesheet" href="menu.css">
        <title>Carte des PSI</title>
        
    </head>

    <div style="text-align: center">
        <FONT>
            <mark class="title">Carte des PSI Cézanne</mark>
        </FONT>
        </div>

    <div id="mapdiv"></div>

    <script src="https://raw.githubusercontent.com/devilishantho2/devilishantho2.github.io/main/OpenLayers.js"></script>

    <script>
      map = new OpenLayers.Map("mapdiv");
      map.addLayer(new OpenLayers.Layer.OSM());
  
      var icon1 = new OpenLayers.Icon('https://raw.githubusercontent.com/devilishantho2/devilishantho2.github.io/main/images/psi-marker.png');

      var center = new OpenLayers.LonLat( 5.4591 ,43.5341 )
            .transform(
              new OpenLayers.Projection("EPSG:4326"), // transform from WGS 1984
              map.getProjectionObject() // to Spherical Mercator Projection
            );
    
      var lonLat = new OpenLayers.LonLat( 5.4591 ,43.5341 )
            .transform(
              new OpenLayers.Projection("EPSG:4326"), // transform from WGS 1984
              map.getProjectionObject() // to Spherical Mercator Projection
            );
            
      var zoom=15;
  
      var markers = new OpenLayers.Layer.Markers( "Markers" );
      map.addLayer(markers);
      
      markers.addMarker(new OpenLayers.Marker(lonLat,icon1));
      
      map.setCenter (center, zoom);
    </script>
  </body></html>
